name: "Update news"

on:
  schedule:
    - cron: "0 */4 * * *"    # cada 4 horas (UTC): 00:00, 04:00, 08:00, 12:00, 16:00, 20:00
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "fetch_news.py"
      - ".github/workflows/update-news.yml"

permissions:
  contents: write

concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch market news
        run: python fetch_news.py

      - name: Commit news if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          if git diff --staged --quiet; then
            echo "Sin cambios en las noticias"
          else
            git commit -m "chore: actualizar noticias [skip ci]"
            git push
          fi
