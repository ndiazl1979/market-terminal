name: "Update market & World Cup data"

on:
  schedule:
    - cron: "*/5 * * * *"    # cada 5 minutos (UTC) — mínimo permitido por GitHub Actions
  workflow_dispatch:          # permite ejecutarlo manualmente
  push:
    branches: [ main ]
    paths:
      - "fetch_data.py"
      - "fetch_worldcup.py"
      - ".github/workflows/update-data.yml"

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch market data
        run: python fetch_data.py

      - name: Fetch World Cup 2026 data
        run: python fetch_worldcup.py
        continue-on-error: true   # si ESPN falla, no abortar el feed de mercados

      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json worldcup.json
          if git diff --staged --quiet; then
            echo "Sin cambios en data.json / worldcup.json"
          else
            git commit -m "chore: actualizar datos de mercado y Mundial [skip ci]"
            git push
          fi
